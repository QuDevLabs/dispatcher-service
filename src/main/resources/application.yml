server:
  port: 9003
spring:
  application:
    name: dispatcher-service
  config:
    import: "optional:configserver:"
  cloud:
    config:
      uri: ${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
      request-connect-timeout: 5000 # 5s
      request-read-timeout: 5000 # 5s
      fail-fast: false # In production, set to true
      retry:
        max-attempts: 6
        initial-interval: 1000 # 1s
        max-interval: 2000 # 2s
        multiplier: 1.1
    function:
      definition: pack|label # 定义函数的名称，多个函数之间用|分隔，函数名称必须与代码中定义的函数名称相同
    stream:
      bindings: # 定义函数与消息代理之间的绑定关系
        packlabel-in-0: # 输入绑定器的名称，格式为<函数名称>-in-<索引>，其中函数名称是上面定义的函数，索引表示输入通道的顺序
          destination: order-accepted # 在代理中，绑定器实际绑定的名称（RabbitMQ中的交换机）
          group: ${spring.application.name} # 对目的地感兴趣的消费者组，与应用的名称相同
        packlabel-out-0: # 输出绑定器的名称，格式为<函数名称>-out-<索引>，其中函数名称是上面定义的函数，索引表示输出通道的顺序
          destination: order-dispatched # 在代理中，绑定器实际绑定的名称（RabbitMQ中的交换机）
  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password
    connection-timeout: 5s

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"

info:
  system: Polar Bookshop

management:
  endpoints:
    web:
      exposure:
        include: bindings, configprops, env, functions, health, heapdump, info, loggers, mappings, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}